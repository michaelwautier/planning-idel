name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          # Version de Streamlit Community Cloud : on teste ce qui tourne en prod.
          python-version: "3.14"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Installer les dépendances
        run: pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Tests (pytest)
        run: pytest -q

      - name: L'application démarre
        run: python -c "import app_planning"
        env:
          # Streamlit n'a pas de navigateur ni de terminal interactif en CI.
          STREAMLIT_SERVER_HEADLESS: "true"
