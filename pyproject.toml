[tool.pytest.ini_options]
testpaths = ["tests"]
# Les modules du projet sont à la racine (pas de package installable) :
# on ajoute la racine au sys.path pour que `import solveur` fonctionne.
pythonpath = ["."]

[tool.ruff]
target-version = "py310"
exclude = ["venv", "planning_idel.py"]

[tool.ruff.lint]
# E741 : `l` est la notation d'origine de l'algorithme de Butcher (calendrier.py)
# et un raccourci pour « ligne » dans sauvegarde.py — pas une ambiguïté ici.
ignore = ["E741"]
