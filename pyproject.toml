[tool.pytest.ini_options]
testpaths = ["tests"]
# The project modules live at the root (no installable package): we add the
# root to sys.path so that `import solver` works.
pythonpath = ["."]

[tool.ruff]
target-version = "py310"
exclude = ["venv", "planning_idel.py"]

[tool.ruff.lint]
# E741: `l` is the original notation of Butcher's algorithm
# (french_calendar.py) — not an ambiguity here.
ignore = ["E741"]
